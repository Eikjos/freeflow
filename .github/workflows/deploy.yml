name: CI/CD Docker Swarm Zéro-Downtime

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/eikjos/freeflow-api
  IMAGE_WEB: ghcr.io/eikjos/freeflow-web
  DEPLOY_PATH: /home/${{ secrets.SSH_USER }}/app/freeflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génération d'un tag unique basé sur le SHA du commit Git
      - name: Set Image Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # --- BUILD & PUSH API ---
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- BUILD & PUSH WEB ---
      - name: Build and push WEB image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./client/Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}:${{ steps.vars.outputs.sha_short }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ssh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Préparer le dossier sur le serveur
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: mkdir -p ${{ env.DEPLOY_PATH }}

      # On copie le stack.yml à chaque fois pour appliquer les modifications de config
      - name: Copier le fichier stack.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "stack.yml"
          target: ${{ env.DEPLOY_PATH }}

      - name: Déploiement Zero-Downtime sur Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            
            # Authentification Docker sur le serveur pour pouvoir pull depuis GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Déploiement/Mise à jour de la stack en injectant les variables requises
            # On utilise le nom de fichier copié (stack.yml) et on nomme la stack "freeflow"
            IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }} \
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }} \
            docker stack deploy --with-registry-auth -c stack.yml freeflow
            
            # Nettoyage optionnel des anciennes images non utilisées
            docker image prune -af --filter "until=24h"