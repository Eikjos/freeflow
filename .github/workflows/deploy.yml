name: CI/CD Docker Swarm Zéro-Downtime

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/eikjos/freeflow-api
  IMAGE_WEB: ghcr.io/eikjos/freeflow-web
  DEPLOY_PATH: /home/${{ secrets.SSH_USER }}/app/freeflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génération d'un tag unique basé sur le SHA du commit Git
      - name: Set Image Tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # --- BUILD & PUSH API ---
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- BUILD & PUSH WEB ---
      - name: Build and push WEB image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/client/Dockerfile
          push: true
          tags: ${{ env.IMAGE_WEB }}:${{ steps.vars.outputs.sha_short }}
          no-cache: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            API_URL=http://api:8080
            ENCRYPTION_KEY=${{ vars.ENCRYPTION_KEY }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

  deploy:
    runs-on: ubuntu-latest
    needs: ['build-and-push']
    environment: deploy

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Deploy stack to the server
        uses: kitconcept/docker-stack-deploy@1a7a5e778d08cf92bda2ebbd068fe0ca078d09c8
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: 22
          remote_user: ${{ secrets.SSH_USER }}
          remote_private_key: ${{ secrets.SSH_KEY }}
          stack_file: "stack.yml"
          stack_name: "freeflow"
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          CLIENT_URL: ${{ vars.CLIENT_URL }}
          ENCRYPTION_KEY: ${{ vars.ENCRYPTION_KEY }}