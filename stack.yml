version: "3.9"

services:
  bdd:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: freeflow
      POSTGRES_DB: freeflow
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "127.0.0.1:5432:5432"
    secrets:
      - db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - backend

  api:
    image: ghcr.io/eikjos/freeflow-api:${IMAGE_TAG}
    deploy:
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        monitor: 1m
        failure_action: rollback
      restart_policy:
        condition: on-failure
    environment:
      NODE_ENV: production
      DB_HOST: bdd
      DB_PORT: 5432
      DB_USER: freeflow
      DB_NAME: freeflow
      SMTP_URL: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: thomashamelin3@gmail.com
      CLIENT_URL: ${CLIENT_URL}
    secrets:
      - source: db_password
        target: DB_PASSWORD
      - source: jwt_secret
        target: SECRET_JWT
      - source: jwt_refresh_secret
        target: JWT_REFRESH_SECRET
      - source: insee_api_key
        target: INSEE_API_KEY
      - source: smtp_password
        target: SMTP_PASSWORD
    depends_on:
      - db
    networks:
      - backend
      - frontend
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: ingress

  web:
    image: ghcr.io/eikjos/freeflow-web:${IMAGE_TAG}
    environment:
      NODE_ENV: production
      API_URL: http://api:8080
      NEXT_PUBLIC_API_URL: ${API_URL}
      HOST: "0.0.0.0"
      HOSTNAME: "0.0.0.0"
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    deploy:
      replicas: 2
      update_config:
        order: start-first
        parallelism: 1
        monitor: 1m
        failure_action: rollback
      restart_policy:
        condition: on-failure
    networks:
      - frontend

volumes:
  db_data:

secrets:
  db_password:
    external: true
  jwt_secret:
    external: true
  jwt_refresh_secret:
    external: true
  insee_api_key:
    external: true
  smtp_password:
    external: true

networks:
  backend:
    driver: overlay
  frontend:
    driver: overlay